      // Expose a global function to create the SCORM wrapper
      // This allows the framework to create the wrapper when it finds the API
      window.createSCORMWrapper = function (api) {
        if (!api) {
          console.error("Cannot create SCORM wrapper: No API provided");
          return null;
        }

        console.log("Creating SCORM wrapper for API", typeof api);

        // Get SCORM version from meta tag (injected during export process)
        const manifestMeta = document.querySelector(
          'meta[name="scorm-version"]'
        );
        
        // Version detection priority:
        // 1. Use meta tag value if it's been replaced (not the placeholder)
        // 2. Fall back to API method detection
        let version;
        if (manifestMeta && manifestMeta.content && 
            manifestMeta.content !== "1.2" &&
            (manifestMeta.content === "2004" || manifestMeta.content === "1.2")) {
          version = manifestMeta.content;
          console.log("🔍 HTML Template - Using meta tag SCORM version:", version);
        } else {
          // Detect from API: SCORM 2004 uses Initialize, SCORM 1.2 uses LMSInitialize
          version = typeof api.Initialize === "function" ? "2004" : "1.2";
          console.log("🔍 HTML Template - Detected SCORM version from API:", version);
        }
        
        console.log(
          "🔍 HTML Template - API methods available:",
          typeof api.Initialize === "function" ? "2004 API (Initialize)" : "1.2 API (LMSInitialize)"
        );

        var wrapper = {
          version: version,
          API: api,
          startTime: new Date().getTime(), // Track start time for session duration

          // Core methods - use detected API methods regardless of package version
          initialize: function () {
            if (this._isInitialized) {
              console.log(
                "⚠️ HTML Template SCORM already initialized, skipping"
              );
              return true;
            }

            let result;
            if (typeof api.Initialize === "function") {
              result = api.Initialize("");
            } else {
              result = api.LMSInitialize("");
            }

            if (result === "true" || result === true) {
              this._isInitialized = true;
              console.log("✅ HTML Template SCORM initialized successfully");
            }

            return result;
          },

          terminate: function () {
            // CRITICAL for SCORM 2004: Set cmi.exit to "suspend" to persist suspend_data
            // Without this, the LMS will not save suspend_data for the next session
            if (version === "2004") {
              try {
                const exitResult = this.setValue("cmi.exit", "suspend");
                
                
                // Verify the value was set
                const verifyExit = this.getValue("cmi.exit");

                
                const commitResult = this.commit();

              } catch (exitError) {
                console.error("❌ Error setting cmi.exit:", exitError);
              }

              return api.Terminate("");
            } else {

              return api.LMSFinish("");
            }
          },

          getValue: function (key) {
            if (typeof api.Initialize === "function") {
              return api.GetValue(key);
            } else {
              return api.LMSGetValue(key);
            }
          },

          setValue: function (key, value) {
            if (typeof api.Initialize === "function") {
              return api.SetValue(key, value);
            } else {
              return api.LMSSetValue(key, value);
            }
          },

          commit: function () {
            if (typeof api.Initialize === "function") {
              return api.Commit("");
            } else {
              return api.LMSCommit("");
            }
          },

          getLastError: function () {
            if (typeof api.Initialize === "function") {
              return api.GetLastError();
            } else {
              return api.LMSGetLastError();
            }
          },

          getErrorString: function (errorCode) {
            if (typeof api.Initialize === "function") {
              return api.GetErrorString(errorCode);
            } else {
              return api.LMSGetErrorString(errorCode);
            }
          },

          getDiagnostic: function (errorCode) {
            if (typeof api.Initialize === "function") {
              return api.GetDiagnostic(errorCode);
            } else {
              return api.LMSGetDiagnostic(errorCode);
            }
          },

          // Helper function to safely parse suspend_data
          parseSuspendData: function (suspendDataStr) {
            if (!suspendDataStr) return {};

            try {
              return JSON.parse(suspendDataStr);
            } catch (e) {
              console.error("Error parsing suspend_data:", e);
              return {};
            }
          },

          // Helper function to merge new data with existing suspend_data
          mergeSuspendData: function (existingData, newData) {
            try {
              const parsedExisting =
                typeof existingData === "string"
                  ? this.parseSuspendData(existingData)
                  : existingData || {};

              // Create a deep merge (not just shallow properties)
              const merged = { ...parsedExisting };

              // Merge top-level properties
              for (const key in newData) {
                // Special handling for objects that need deep merging
                if (
                  key === "quiz" &&
                  typeof newData[key] === "object" &&
                  typeof merged[key] === "object"
                ) {
                  merged[key] = { ...merged[key], ...newData[key] };
                } else if (
                  key === "completedSlides" &&
                  typeof newData[key] === "object" &&
                  typeof merged[key] === "object"
                ) {
                  merged[key] = { ...merged[key], ...newData[key] };
                } else if (
                  key === "progress" &&
                  typeof newData[key] === "object" &&
                  typeof merged[key] === "object"
                ) {
                  merged[key] = {
                    ...merged[key],
                    ...newData[key],
                    // Special handling for completedSlides - preserve array format
                    completedSlides: Array.isArray(newData[key].completedSlides)
                      ? newData[key].completedSlides
                      : Array.isArray(merged[key].completedSlides)
                        ? merged[key].completedSlides
                        : [],
                  };
                } else {
                  // For non-object properties or other objects, just replace
                  merged[key] = newData[key];
                }
              }

              return JSON.stringify(merged);
            } catch (e) {
              console.error("Error merging suspend_data:", e);
              // If merge fails, just use the new data
              return JSON.stringify(newData);
            }
          },

          // Standard implementation of recordSlideView
          recordSlideView: function (index) {
            try {
              console.log("Recording slide view for index:", index);

              // Get the suspend_data key based on SCORM version
              const suspendDataKey =
                version === "2004"
                  ? "cmi.suspend_data"
                  : "cmi.core.suspend_data";
              const locationKey =
                version === "2004"
                  ? "cmi.location"
                  : "cmi.core.lesson_location";

              // Prepare location data
              const locationData = {
                slide: index,
                id: "slide-" + index,
              };

              // Update the location
              this.setValue(locationKey, JSON.stringify(locationData));

              // Get current suspend_data
              const currentSuspendData = this.getValue(suspendDataKey);

              // Parse the current suspend_data or create empty object if none exists
              const parsedData = this.parseSuspendData(currentSuspendData);

              // Update slide position
              parsedData.slide = index;
              parsedData.lastSlide = Math.max(index, parsedData.lastSlide || 0);

              // Update completed slides (array format)
              if (!parsedData.completedSlides) parsedData.completedSlides = [];
              if (!parsedData.completedSlides.includes(index))
                parsedData.completedSlides.push(index);

              // Update progress tracking (array format)
              if (!parsedData.progress) parsedData.progress = {};
              if (!parsedData.progress.completedSlides)
                parsedData.progress.completedSlides = [];
              if (!parsedData.progress.completedSlides.includes(index))
                parsedData.progress.completedSlides.push(index);
              parsedData.progress.slide = index;

              // Add timestamp
              parsedData.timestamp = new Date().toISOString();

              // Save the updated suspend_data
              this.setValue(suspendDataKey, JSON.stringify(parsedData));

              // Commit the changes
              this.commit();

              return true;
            } catch (e) {
              console.error("Error recording slide view:", e);
              return false;
            }
          },

          // Standard implementation of saveSession
          saveSession: function () {
            console.log("Saving SCORM session");

            try {
              // Get the suspend_data key based on SCORM version
              const suspendDataKey =
                version === "2004"
                  ? "cmi.suspend_data"
                  : "cmi.core.suspend_data";

              // Calculate session time
              if (this.startTime) {
                let sessionTime;

                // Calculate session time
                const currentTime = new Date().getTime();
                const elapsedSeconds = Math.floor(
                  (currentTime - this.startTime) / 1000
                );
                const hours = Math.floor(elapsedSeconds / 3600);
                const minutes = Math.floor((elapsedSeconds % 3600) / 60);
                const seconds = elapsedSeconds % 60;

                // Format the time string based on SCORM version
                if (version === "1.2") {
                  // SCORM 1.2 format: HH:MM:SS
                  sessionTime = [
                    hours.toString().padStart(2, "0"),
                    minutes.toString().padStart(2, "0"),
                    seconds.toString().padStart(2, "0"),
                  ].join(":");

                  this.setValue("cmi.core.session_time", sessionTime);
                } else {
                  // SCORM 2004 format: PT#H#M#S
                  sessionTime =
                    "PT" + hours + "H" + minutes + "M" + seconds + "S";
                  this.setValue("cmi.session_time", sessionTime);
                }
              }

              // Get the current suspend_data
              const currentSuspendData = this.getValue(suspendDataKey);

              // If there's current suspend_data, ensure we preserve any critical info
              // that might not be tracked in our main data object
              if (currentSuspendData) {
                const parsedData = this.parseSuspendData(currentSuspendData);

                // Update the timestamp
                parsedData.timestamp = new Date().toISOString();

                // Save the updated suspend_data
                this.setValue(suspendDataKey, JSON.stringify(parsedData));
              }

              // Commit the data
              this.commit();

              return true;
            } catch (e) {
              console.error("Error saving session:", e);
              return false;
            }
          },

          setScore: function (score) {
            console.log(
              "🎯 setScore called with score:",
              score,
              "version:",
              version
            );

            if (!this.API) {
              console.error("Cannot set score: SCORM API not available");
              return false;
            }

            try {
              if (version === "1.2") {
                // SCORM 1.2 score elements
                console.log("🎯 Setting SCORM 1.2 score fields");
                this.setValue("cmi.core.score.raw", score.toString());
                this.setValue("cmi.core.score.min", "0");
                this.setValue("cmi.core.score.max", "100");

                // Verify the values were set
                console.log(
                  "🔍 Verification - SCORM 1.2 fields after setScore:"
                );
                console.log(
                  "  cmi.core.score.raw:",
                  this.getValue("cmi.core.score.raw")
                );
                console.log(
                  "  cmi.core.score.min:",
                  this.getValue("cmi.core.score.min")
                );
                console.log(
                  "  cmi.core.score.max:",
                  this.getValue("cmi.core.score.max")
                );
                return true;
              } else {
                // SCORM 2004 score elements
                console.log("🎯 Setting SCORM 2004 score fields");
                this.setValue("cmi.score.raw", score.toString());
                this.setValue("cmi.score.scaled", (score / 100).toString());
                this.setValue("cmi.score.min", "0");
                this.setValue("cmi.score.max", "100");

                // Verify the values were set
                console.log(
                  "🔍 Verification - SCORM 2004 fields after setScore:"
                );
                console.log("  cmi.score.raw:", this.getValue("cmi.score.raw"));
                console.log(
                  "  cmi.score.scaled:",
                  this.getValue("cmi.score.scaled")
                );
                console.log("  cmi.score.min:", this.getValue("cmi.score.min"));
                console.log("  cmi.score.max:", this.getValue("cmi.score.max"));
                return true;
              }
            } catch (e) {
              console.error("Error setting SCORM score:", e);
              return false;
            }
          },

          setComplete: function () {
            if (version === "2004") {
              this.setValue("cmi.completion_status", "completed");
              return true;
            } else {
              this.setValue("cmi.core.lesson_status", "completed");
              return true;
            }
          },

          getVersion: function () {
            return version;
          },
        };

        // Return the wrapper
        return wrapper;
      };
    </script>
