<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #080810;
      --surface:  #0f0f1c;
      --border:   #1e1e35;
      --accent:   #5b4fff;
      --accent2:  #ff4f9b;
      --text:     #e8e8f0;
      --muted:    #6b6b8a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── noise overlay ── */
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0;
    }

    /* ── header ── */
    header {
      position: relative; z-index:1;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 16px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 18px;
      color: var(--text);
    }

    .header-meta {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── hero ── */
    .hero {
      position: relative; z-index:1;
      padding: 72px 48px 48px;
    }

    .hero-tag {
      display: inline-block;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      max-width: 600px;
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      margin-top: 16px;
      color: var(--muted);
      font-size: 15px;
      max-width: 400px;
      line-height: 1.6;
    }

    /* ── stats row ── */
    .stats {
      position: relative; z-index:1;
      padding: 0 48px 48px;
      display: flex; gap: 32px;
    }

    .stat {
      display: flex; flex-direction: column; gap: 2px;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800;
      color: var(--text);
    }

    .stat-label { font-size: 12px; color: var(--muted); }

    /* ── grid ── */
    .grid-wrap {
      position: relative; z-index:1;
      padding: 0 48px 80px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex; flex-direction: column;
      transition: border-color .25s, transform .25s;
      animation: fadeUp .5s both;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .10s; }
    .card:nth-child(3) { animation-delay: .15s; }
    .card:nth-child(4) { animation-delay: .20s; }
    .card:nth-child(5) { animation-delay: .25s; }
    .card:nth-child(6) { animation-delay: .30s; }

    .card-thumb {
      height: 140px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
    }

    .card-body {
      padding: 20px;
      flex: 1;
      display: flex; flex-direction: column; gap: 8px;
    }

    .card-category {
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      flex: 1;
    }

    .card-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex; gap: 12px;
    }

    .btn-play {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px;
      background: var(--accent);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      transition: opacity .2s;
    }

    .btn-play:hover { opacity: .85; }

    /* ── empty state ── */
    .empty {
      grid-column: 1/-1;
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      border: 2px dashed var(--border);
      border-radius: 16px;
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-family:'Syne',sans-serif; font-size:18px; color: var(--text); margin-bottom:8px; }
    .empty p  { font-size:14px; line-height:1.6; max-width:320px; margin:0 auto; }

    @media (max-width: 600px) {
      header, .hero, .stats, .grid-wrap { padding-left:20px; padding-right:20px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-mark">L</div>
    <span class="logo-text">LearnPortal</span>
  </a>
  <span class="header-meta" id="course-count">0 courses available</span>
</header>

<section class="hero">
  <div class="hero-tag">E-Learning Platform</div>
  <h1>Your <span>Courses</span>,<br/>All in One Place.</h1>
  <p class="hero-sub">Browse and launch your SCORM courses directly from your browser — no app needed.</p>
</section>

<div class="stats">
  <div class="stat">
    <span class="stat-num" id="stat-total">0</span>
    <span class="stat-label">Total Courses</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-cats">0</span>
    <span class="stat-label">Categories</span>
  </div>
</div>

<div class="grid-wrap">
  <div class="section-title">All Courses</div>
  <div class="grid" id="grid"></div>
</div>

<script src="courses.js"></script>

</body>
</html>
